<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pendaftaran Tech Comunity</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form id="f1Form">
        <fieldset>
            <legend>Pendaftaran Tech Comunity</legend>

            <p>Nama : <input type="text" id="namaInput" name="nama" required></p>
            <p>Alamat Email : <input type="text" name="alamat" required></p>
            
            <p>
                Pekerjaan :
                <input type="radio" name="size" value="S" checked /> Pelajar
                <input type="radio" name="size" value="M" /> Mahasiswa
                <input type="radio" name="size" value="L" /> Pekerja
                <input type="radio" name="size" value="XL" /> Pengajar
            </p>

            <p>
                Pilih Spesialis : <br>
                <input type="checkbox" name="team" value="Web Pemrograman"> Web Pemrograman
                <input type="checkbox" name="team" value="UI/UX"> UI/UX
                <input type="checkbox" name="team" value="Cyber Security"> Cyber Security
            </p>

            <p>
                Jenis Kelamin :
                <select name="gender">
                    <option>Laki-Laki</option>
                    <option>Perempuan</option>
                </select>
            </p>

            <p>
                Catatan Tambahan :<br>
                <textarea rows="5" cols="50" placeholder="Contoh: Saya mempunyai 2 Spesialis..."></textarea>
            </p>

            <p><input type="submit" value="Submit Pesanan" class="submit-btn"></p>
        </fieldset>
    </form>

    <div id="popupMessage" class="popup"></div>

    <button class="back"><a href="index.html">Home</a></button>

    <script>
        document.getElementById('f1Form').onsubmit = function(e) {
            e.preventDefault();
            const nama = document.getElementById('namaInput').value;
            const popup = document.getElementById('popupMessage');
            
            popup.innerHTML = "Hai <strong>" + nama + "</strong>, pesanan kamu sudah kami terima!";
            popup.style.display = "block";
        };
    </script>
</body>
</html>
